<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tauri + SvelteKit + Typescript App</title>
    <script>
      function showError(title, msg) {
        var div = document.createElement('div');
        div.style.cssText = 'color:white; background:red; z-index:9999; position:absolute; top:0; left:0; width:100%; height:100%; padding: 20px; font-family: monospace; overflow: auto;';
        div.innerHTML = '<h2>' + title + '</h2><p>' + msg + '</p>';
        if (document.body) {
          document.body.appendChild(div);
        } else {
          document.addEventListener('DOMContentLoaded', () => document.body.appendChild(div));
        }
      }
      window.onerror = function(msg, url, line, col, error) {
        showError('JS Error', msg + '<br/>' + url + ':' + line + '<br/>' + (error ? error.stack : ''));
      };
      window.addEventListener('unhandledrejection', function(e) {
        showError('Unhandled Promise Rejection', String(e.reason));
      });
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
